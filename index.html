<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Français Sans Illusion | Raghad Aboud</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffffff 0%, #eaf4ff 100%);
      color: #1f2937;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .home {
      width: 100%;
      max-width: 760px;
      padding: 38px 22px;
    }

    .brand-logo {
      width: 260px;
      max-width: 80%;
      margin: 0 auto 22px;
      display: block;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.6rem;
      color: #1E5BB8;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    h2 {
      margin: 0 0 24px;
      font-size: 1.55rem;
      font-weight: 600;
      color: #111827;
    }

    p {
      margin: 0 0 34px;
      font-size: 1.05rem;
      line-height: 1.7;
      color: #4b5563;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 34px;
    }

    .btn {
      text-decoration: none;
      background: #1E5BB8;
      color: #ffffff;
      padding: 14px 26px;
      border-radius: 999px;
      font-weight: 600;
      box-shadow: 0 10px 22px rgba(30, 91, 184, 0.24);
      transition: 0.25s ease;
    }

    .btn.secondary {
      background: #ffffff;
      color: #1E5BB8;
      border: 1px solid #c9dcff;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .socials {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      max-width: 560px;
      margin: 0 auto 36px;
    }

    .socials a,
    .socials button {
      border: none;
      background: #ffffff;
      color: #1E5BB8;
      text-decoration: none;
      font-weight: 600;
      padding: 14px 10px;
      border-radius: 18px;
      box-shadow: 0 8px 18px rgba(30, 91, 184, 0.12);
      cursor: pointer;
      transition: 0.25s ease;
      font-size: 0.95rem;
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 86px;
      gap: 8px;
    }

    .socials a:hover,
    .socials button:hover {
      transform: translateY(-3px);
      background: #f5f9ff;
    }

    .socials i {
      font-size: 1.7rem;
    }

    footer {
      font-size: 0.92rem;
      color: #6b7280;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(20px);
      background: #1E5BB8;
      color: #ffffff;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
      box-shadow: 0 10px 24px rgba(30, 91, 184, 0.25);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 2rem;
      }

      h2 {
        font-size: 1.25rem;
      }

      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .socials {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

  <main class="home">

    <img 
      src="assets/logos/logo-light.png" 
      alt="Français Sans Illusion Logo" 
      class="brand-logo"
    >

    <h1>Français Sans Illusion</h1>

    <h2>Enjoy learning French.</h2>

    <p>
      Interactive French lessons &amp; activities.<br>
      Designed by Raghad Aboud. Enhanced with AI.
    </p>

    <div class="buttons">
      <a class="btn" href="learn.html">▶ Start Learning</a>
      <a class="btn secondary" href="about.html">👋 Meet Raghad</a>
    </div>

    <div class="socials">
      <a href="https://www.instagram.com/francais.sans.illusion/" target="_blank">
        <i class="fa-brands fa-instagram"></i>
        Instagram
      </a>

      <a href="https://www.linkedin.com/in/raghadaboud/" target="_blank">
        <i class="fa-brands fa-linkedin"></i>
        LinkedIn
      </a>

      <a href="https://www.youtube.com/@RaghadAboud-e4y" target="_blank">
        <i class="fa-brands fa-youtube"></i>
        YouTube
      </a>

      <button onclick="copyEmail()">
        <i class="fa-regular fa-envelope"></i>
        Email
      </button>
    </div>

    <footer>
      Designed with ❤️ &amp; AI by Raghad Aboud
    </footer>

  </main>

  <div id="toast" class="toast">Email copied ✔</div>

  <script>
    function copyEmail() {
      navigator.clipboard.writeText("raghad.aboud.fle@gmail.com");
      const toast = document.getElementById("toast");
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 2000);
    }
  </script>

</body>
</html>
