<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Français Sans Illusion | Raghad Aboud</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffffff 0%, #eaf4ff 100%);
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .home {
      width: 100%;
      max-width: 720px;
      padding: 40px 24px;
    }

    .logo {
      width: 112px;
      height: 112px;
      margin: 0 auto 24px;
      border-radius: 30px;
      background: #ffffff;
      box-shadow: 0 12px 32px rgba(47, 94, 168, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      color: #2f5ea8;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2.4rem;
      color: #2f5ea8;
    }

    h2 {
      margin: 0 0 22px;
      font-size: 1.55rem;
      font-weight: 600;
    }

    p {
      margin: 0 0 32px;
      font-size: 1.05rem;
      line-height: 1.7;
      color: #4b5563;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .btn {
      text-decoration: none;
      background: #2f5ea8;
      color: #ffffff;
      padding: 13px 24px;
      border-radius: 999px;
      font-weight: bold;
      box-shadow: 0 8px 18px rgba(47, 94, 168, 0.25);
      transition: 0.25s ease;
    }

    .btn.secondary {
      background: #ffffff;
      color: #2f5ea8;
      border: 1px solid #c9dcff;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .socials a,
    .socials button {
      border: none;
      background: #ffffff;
      color: #2f5ea8;
      text-decoration: none;
      font-weight: bold;
      padding: 11px 16px;
      border-radius: 999px;
      box-shadow: 0 6px 16px rgba(47, 94, 168, 0.12);
      cursor: pointer;
      transition: 0.25s ease;
      font-size: 0.95rem;
      font-family: Arial, sans-serif;
    }

    .socials a:hover,
    .socials button:hover {
      transform: translateY(-2px);
      background: #f5f9ff;
    }

    .socials i {
      margin-right: 7px;
      font-size: 1rem;
    }

    footer {
      font-size: 0.92rem;
      color: #6b7280;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(20px);
      background: #2f5ea8;
      color: #ffffff;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: bold;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
      box-shadow: 0 10px 24px rgba(47, 94, 168, 0.25);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 600px) {
      .home {
        padding: 32px 18px;
      }

      h1 {
        font-size: 1.85rem;
      }

      h2 {
        font-size: 1.25rem;
      }

      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        box-sizing: border-box;
      }

      .socials {
        gap: 10px;
      }

      .socials a,
      .socials button {
        width: 46%;
      }
    }
  </style>
</head>

<body>

  <main class="home">

    <div class="logo">
      <i class="fa-regular fa-comments"></i>
    </div>

    <h1>🇫🇷 Français Sans Illusion</h1>

    <h2>Enjoy learning French.</h2>

    <p>
      Interactive French lessons &amp; activities.<br>
      Designed by Raghad Aboud. Enhanced with AI.
    </p>

    <div class="buttons">
      <a class="btn" href="learn.html">▶ Start Learning</a>
      <a class="btn secondary" href="about.html">👋 Meet Raghad</a>
    </div>

    <div class="socials">
      <a href="https://www.instagram.com/francais.sans.illusion/" target="_blank">
        <i class="fa-brands fa-instagram"></i> Instagram
      </a>

      <a href="https://www.linkedin.com/in/raghadaboud/" target="_blank">
        <i class="fa-brands fa-linkedin"></i> LinkedIn
      </a>

      <a href="https://www.youtube.com/@RaghadAboud-e4y" target="_blank">
        <i class="fa-brands fa-youtube"></i> YouTube
      </a>

      <button onclick="copyEmail()">
        <i class="fa-regular fa-envelope"></i> Email
      </button>
    </div>

    <footer>
      Designed with ❤️ &amp; AI by Raghad Aboud
    </footer>

  </main>

  <div id="toast" class="toast">Email copied ✔</div>

  <script>
    function copyEmail() {
      navigator.clipboard.writeText("raghad.aboud.fle@gmail.com");
      const toast = document.getElementById("toast");
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 2000);
    }
  </script>

</body>
</html>
