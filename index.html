<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Français Sans Illusion | Raghad Aboud</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #ffffff, #eaf4ff);
      color: #1f2937;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .home {
      max-width: 700px;
      padding: 40px 24px;
    }

    .logo {
      width: 110px;
      height: 110px;
      margin: 0 auto 24px;
      border-radius: 28px;
      background: white;
      box-shadow: 0 12px 30px rgba(47, 94, 168, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: #2f5ea8;
    }

    h1 {
      font-size: 2.4rem;
      margin: 0 0 12px;
      color: #2f5ea8;
    }

    h2 {
      font-size: 1.6rem;
      margin: 0 0 22px;
      font-weight: 600;
    }

    p {
      font-size: 1.05rem;
      color: #4b5563;
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .btn {
      text-decoration: none;
      background: #2f5ea8;
      color: white;
      padding: 13px 24px;
      border-radius: 999px;
      font-weight: bold;
      box-shadow: 0 8px 18px rgba(47, 94, 168, 0.25);
      transition: 0.2s ease;
    }

    .btn.secondary {
      background: white;
      color: #2f5ea8;
      border: 1px solid #c9dcff;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      font-weight: bold;
    }

    .socials a {
      color: #2f5ea8;
      text-decoration: none;
    }

    footer {
      margin-top: 38px;
      font-size: 0.9rem;
      color: #6b7280;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.9rem;
      }

      h2 {
        font-size: 1.3rem;
      }

      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        box-sizing: border-box;
      }
    }
  </style>
</head>

<body>
  <main class="home">

    <div class="logo">💬</div>

    <h1>🇫🇷 Français Sans Illusion</h1>

    <h2>Enjoy learning French.</h2>

    <p>
      Interactive French lessons & activities.<br>
      Designed by Raghad Aboud. Enhanced with AI.
    </p>

    <div class="buttons">
      <a class="btn" href="activities.html">▶ Start Learning</a>
      <a class="btn secondary" href="about.html">👋 Meet Raghad</a>
    </div>

    <div class="socials">
      <a href="https://www.instagram.com/francais.sans.illusion/" target="_blank">Instagram</a>
      <a href="https://www.linkedin.com/in/raghad-aboud/" target="_blank">LinkedIn</a>
      <a href="https://www.youtube.com/@RaghadAboud-e4y" target="_blank">YouTube</a>
      <a href="mailto:raghad.aboud.fle@gmail.com">Email</a>
    </div>

    <footer>
      Designed with ❤️ & AI by Raghad Aboud
    </footer>

  </main>
</body>
</html>
